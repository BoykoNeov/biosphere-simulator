# Phase 9 Step 6 — a reusable ENERGY DOMAIN bundle (a battery that self-discharges).
#
# A *domain* = a named stock+flow bundle over a quantity set — here ENERGY: a `battery`
# POOL that leaks to a `waste_heat` boundary sink via the frozen Power SelfDischarge
# kinetics (`k * battery`, the Step-2 authored-kinetics anchor), reusing the frozen
# `self_discharge` param set so `k` is the frozen value. Disjoint from the crew domain
# (no shared stock/forcing, no shared quantity), so a station that includes BOTH composes
# trivially — every flow stays independently balanced, all four quantities conserved.
#
# This is a runtime authored artifact (decision B); the SelfDischarge kinetics mark the
# composed run `has_authored_kinetics` ("authored != validated"). No parameters, no
# forcings (donor-controlled reads the battery stock directly). No run config (a bundle
# never carries one). Exponents are written signed (YAML-1.1 float resolver).

stocks:
  - id: power.battery
    domain: power
    quantity: energy
    kind: pool
    amount: 1.0e+7
  - id: boundary.waste_heat
    domain: boundary
    quantity: energy
    kind: boundary
    amount: 0.0

flows:
  - id: power.self_discharge
    kinetics:
      rate: 'param("self_discharge_rate") * stock("power.battery")'
      stoichiometry:
        power.battery: -1
        boundary.waste_heat: 1
    params: self_discharge
