# power — solar charge efficiency param (Phase 5, P5.2)
# Currency/units: ENERGY (J). The one coefficient the Power core introduces.
#
# charge_efficiency (η_c) — ONE-WAY charge efficiency (dimensionless), stored/supplied:
#   the fraction of supplied solar energy that reaches the battery; the remainder
#   (1−η_c) is booked as charge-conversion HEAT (SolarCharge's 3rd leg). This is the
#   structural enforcement of "every joule named" — the loss is a visible, balanced leg,
#   not a hidden net delta. The implementation ALWAYS emits three legs; at η_c = 1 the
#   heat leg is exactly 0 (no charge loss).
#
# One-way, NOT round-trip — and how the two relate IN THIS MODEL (the honest part).
#   Discharge in the standalone model (LoadDraw) is JOULE-LOSSLESS: it moves the full Y
#   from battery → waste_heat, first-law-conserved; the discharge "loss" is exergy
#   (usefulness), tracked as the monotonic heat-generated diagnostic, NOT a joule loss.
#   So charge is the ONLY joule-losing leg, and the MODELED electrical round-trip
#   efficiency simply EQUALS η_c (no √-decomposition — that would assume a symmetric
#   charge/discharge split, which this lossless-discharge model does not have).
#
#   Consequence: η_c = 0.95 is a realistic CHARGE-LEG figure, so the modeled round-trip
#   (0.95) is OPTIMISTIC vs a real Li-ion ROUND-TRIP of ~0.90 — because the discharge-
#   side conversion loss is a deferred seam (a second efficiency on LoadDraw, or the
#   useful_work split). To model a CALIBRATED ~0.90 round-trip standalone, lump the whole
#   loss onto η_c (set η_c ≈ 0.90) — a Phase-6 validation-gate calibration choice, NOT
#   made here (Phase 5 ships machinery, not calibrated numbers; the value is provisional).
#
# Units discipline (P4 / config/units.py): a dimensionless efficiency is NOT a
#   conserved-Quantity canonical unit, so it is a schema-validated, bound-checked float
#   carrying a declared unit (exact-string guarded at the loader, like the biosphere's
#   growth_efficiency). It must lie in (0, 1]: 0 (a battery that stores nothing) and
#   negative/>1 (creates energy) are rejected.
#
# Capacity is NOT here (deliberate): POOL stocks have no upper clamp in this engine, so
#   battery capacity is sizing/scenario data (the initial SOC + well-fed sizing), landed
#   with build_power in Step 3 — not a flow coefficient. See power/stocks.py.
#
# Clean-room: value from cited primary literature ONLY (battery efficiency is textbook).
#
# PROVENANCE (post-roadmap bucket 3 scope C, 2026-07-16 — docs/plans/post-roadmap-citation.md).
#   TODO(cite) discharged as CITED, bound to [C] — a NEW source, opened and read. η_c = 0.95
#   is one of only ~5 params in the project whose value a primary source genuinely fixes.
#
#   TWO readings of the bind, both recorded because the model's structure makes them differ:
#     * AS LITERALLY DEFINED (a one-way charge-leg ENERGY efficiency), 0.95 ≈ [C]'s measured
#       0.945 at 25 °C / 1P — an essentially exact match, marginally optimistic.
#     * AS MODELED (discharge is joule-lossless, so η_c IS the modeled round-trip), 0.95 is
#       ~5 points optimistic against [C]'s measured round-trip of 0.8991 at 25 °C.
#   So [C] CONFIRMS this file's own long-standing concession ("0.95 is optimistic vs a real
#   Li-ion round-trip of ~0.90") — from primary literature, in one paper, both legs measured.
#   The concession was right; it is now evidenced rather than asserted.
#
#   ✅ [A] AND [B] WERE OPENED IN ROUND 4 (2026-07-20, supplied by the user) — and UNLIKE
#   self_discharge.yaml, WHERE THE PARALLEL ATTRIBUTION WAS FALSE, BOTH CHECK OUT HERE.
#   That contrast is the point worth keeping: the same two papers, cited in two files by the
#   same author at the same time, one attribution true and one fabricated. Being right about
#   a source in one place is no evidence at all about the next place — the unit of trust is
#   the CLAIM, not the paper and not the person.
#     [A] — SUBSTANTIALLY CONFIRMED, upper bound slightly overstated. Table 1, p. 929
#           ("Energy storage for utility transmission and distribution grid support"),
#           Li-ion row, "% Efficiency (total cycles)" column: "90–94 (4500)". This file
#           attributed "~0.90-0.95" to it; the printed range is 0.90–0.94. Ours (0.95) is
#           therefore ABOVE [A]'s stated range, not inside it — a small but real correction,
#           and it points the same way every other source here does (see [C]: ours is
#           optimistic).
#           ⚠ AND IT IS NOT [A]'s DATA. Table 1 is captioned "[Courtesy of EPRI]" and sourced
#           to ref (1), EPRI Report 1020676 ("Electrical energy storage technology options",
#           2010). So [A] is a review REPRODUCING a utility report's table. The round-1
#           skeptical read ("a review assertion, not primary data") was CORRECT and if
#           anything understated: it is a reproduced table, one step further removed.
#     [B] — CONFIRMED AS A CLAIM, BUT ITS NUMBER IS UNUSABLE. Divya 2009 Table 1, p. 514
#           does survey efficiency by chemistry, as attributed: lead-acid 72–78 %, NiCd
#           72–78 %, NaS 89 % (at 325 °C), VRB 85 %, ZnBr 75 %, metal-air 50 %, PSB 75 %.
#           ⚠ But its Li-ion entry is "η ≈ 100%" (p. 513 text: "storage efficiency close to
#           100%"), which cannot be a round-trip energy efficiency — it is contradicted by
#           [C]'s MEASURED 0.8991 round-trip at 25 °C, and is most likely a coulombic figure
#           or an unqualified reproduction. [B]'s Table 1 is cited to refs [10–12], three
#           bare URLs. So [B] is NOT usable as support: taken literally it would license a
#           HIGHER efficiency than ours and contradict the measured primary this file now
#           rests on. Demoting it in round 1 was the right call for a reason round 1 could
#           not yet see.
#   NET EFFECT ON THE VALUE: none. The value already rests on [C], a measured primary
#   obtained in round 2, precisely so that it would not depend on [A]/[B]. That decision is
#   what contained this — had 0.95 still rested on "[A] says 0.90-0.95", round 4 would have
#   found a frozen value resting on a misquoted reproduction of a third party's table.
#
# Sources:
#   [C] Bašić, H., Bobanac, V., Pandžić, H. (2023), "Determination of Lithium-Ion Battery
#       Capacity for Practical Applications", Batteries 9(9):459.
#       https://doi.org/10.3390/batteries9090459 (open access; verified 2026-07-16).
#       § 3.2.3 + Table 3 ("One-way energy efficiencies for NMC battery cell"): "At 1P, the
#       discharging efficiency at 25 °C is over 0.95, while at 0 °C, it is just above 0.92.
#       The charging efficiencies are much closer, at 0.945 and 0.935."
#       § 3.2.2 (round-trip): "the fixed round-trip efficiency measured for a 1.0P
#       charging/discharging cycle at an environmental temperature of 0 °C is 0.8648, while
#       at an environmental temperature of 25 °C, it amounts to 0.8991."
#       NOTE: efficiency is strongly rate-dependent (their Table 3 sweeps 0.1P–1.0P, rising
#       toward ~0.985 at low rates), so 0.945 is the 1P figure and ours is defensible at
#       low-to-moderate C-rate. NOTE ALSO: COULOMBIC efficiency is a different quantity
#       (>99 %; "Coulombic losses ... are less than 1%") — ours is an ENERGY efficiency.
#   [A] Dunn, B., Kamath, H., Tarascon, J.-M. (2011), "Electrical Energy Storage for the
#       Grid: A Battery of Choices", Science 334(6058):928-935.
#       doi:10.1126/science.1212741. OPENED AND READ 2026-07-20 (round 4).
#       Table 1, p. 929, Li-ion row, "% Efficiency (total cycles)": "90–94 (4500)". Caption:
#       "[Courtesy of EPRI]"; table sourced to its ref (1), EPRI Report 1020676 (2010).
#       CONFIRMS the by-chemistry efficiency attribution with the upper bound corrected
#       0.95 → 0.94. A REVIEW REPRODUCING A REPORT'S TABLE — a contrast/lead, never a bind.
#   [B] Divya, K.C., Østergaard, J. (2009), "Battery energy storage technology for power
#       systems — An overview", Electric Power Systems Research 79(4):511-520.
#       doi:10.1016/j.epsr.2008.09.017. OPENED AND READ 2026-07-20 (round 4).
#       Table 1, p. 514 surveys η by chemistry as attributed (lead-acid 72–78 %, NiCd
#       72–78 %, NaS 89 %, VRB 85 %, ZnBr 75 %, metal-air 50 %, PSB 75 %) — but gives
#       Li-ion "η ≈ 100%", which is not a credible round-trip energy efficiency and is
#       contradicted by [C]'s measured 0.8991. Table cited to refs [10–12], three bare URLs.
#       NOT USABLE AS SUPPORT for this param; retained as the record of a checked lead.

name: power
process: charge

parameters:
  charge_efficiency:
    value: 0.95
    unit: "dimensionless"
    source: "[C], § 3.2.3 + Table 3: measured one-way CHARGE energy efficiency of an NMC cell is 0.945 at 25 °C / 1P (0.935 at 0 °C) — ours is 0.95, an essentially exact match, marginally optimistic. DELTA (the model-structure caveat): because discharge here is joule-lossless, η_c IS the modeled round-trip, and [C] § 3.2.2 measures the real round-trip at 0.8991 (25 °C) — so as MODELED, 0.95 is ~5 points optimistic. That confirms this file's own concession from primary literature; the discharge-side loss remains a deferred seam. Rate-dependent: 0.945 is the 1P figure, rising toward ~0.985 at low rates. An ENERGY efficiency, not coulombic (>99 %). ROUND 4 (2026-07-20): [A] and [B] were finally opened and neither changes the value, which already rested on [C] by design. [A] Table 1 gives Li-ion '90-94', so this file's old '~0.90-0.95' attribution overstated its upper bound and ours (0.95) sits ABOVE [A]'s range — a second source agreeing ours is optimistic; note [A]'s table is '[Courtesy of EPRI]', a review reproducing EPRI Report 1020676, not primary data. [B]'s by-chemistry survey is real but gives Li-ion 'η ≈ 100%', not credible as a round-trip and contradicted by [C]'s measured 0.8991 — unusable as support. ⚠ Contrast self_discharge.yaml, where the SAME two papers were cited by the same author at the same time and the attribution there is FALSE: the unit of trust is the claim, not the paper."
