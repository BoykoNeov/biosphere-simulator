ARROWED IT (marked inline). No primary source binds 2.6 %/month. [SUPERSEDED BY ROUND 4 — the bracketing '1–3 %/month' was called VENDOR folklore 'absent from primary literature'; that is FALSE as written, see above: [B] tabulates it in a peer-reviewed journal. Only the primary/review half survives.] And [D], a 2023 study devoted entirely to long-term self-discharge across three chemistries, ALSO reports no %/month constant, only float currents 'in the order of µA'. A dedicated modern primary declining to state the number is the strongest form of that finding: it is not how the field measures the quantity. Two independent primaries now put the true rate BELOW ours: [C] measures ≈ 0.4 %/30 d at 25 °C for an LFP cell (ours ~6–7×, and above every point on its whole 10–55 °C curve — a hot/older-cell figure); and ours implies a 40–115 µA float current on [D]'s three 18650 cells (Table 1: 1.1/2.15/3.2 Ah), one to two orders above [D]'s measured 'order of µA'. Both comparisons are order-of-magnitude, NOT binds — [C]'s value is graphical and [D]'s per-cell currents live in Figures 4–6, never in text. Kept because it is CONSERVATIVE (pessimistic shelf-loss only tightens the power margin) and because the attractor property is proved magnitude-independently by the two-run contraction test. ✅ [A][B] ARE NO LONGER UNVERIFIED — supplied and opened in round 4, which is how the false attribution above was found; the risk this line used to flag as live is the risk that materialized. Changing the value is calibration = scope B. See docs/plans/post-roadmap-citation.md."
