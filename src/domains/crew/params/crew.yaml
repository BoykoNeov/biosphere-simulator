# crew — metabolic-split coefficients (Phase 5, Step 7)
# Currency/units: CARBON (mol), WATER (kg), OXYGEN (mol). The coefficients the Crew core
# introduces — the physiology fractions that split each ingested quantity across its named
# output fates. The forced crew intake RATES and the initial store inventories are scenario
# data (crew/scenario.py), NOT params (the biosphere/Power/Thermal/ECLSS data-vs-coefficient
# split).
#
# The standalone Crew domain holds three finite provisioned-consumable POOLs (food_store /
# water_store / o2_store) drawn down by three FORCED metabolic flows, each splitting an
# ingested quantity across output fates that route to DIFFERENT Phase-6 destinations:
#     O₂:    o2_store   → crew_o2_consumed                 (decoupled metabolic-O₂ sink)
#     CARBON: food_store → exhaled_co2 (f_resp)            [→ ECLSS cabin_co2]
#                        + fecal_waste ((1−f_resp))        [→ solid-waste system]
#     WATER: water_store → crew_humidity (f_insensible)    [→ ECLSS cabin_h2o]
#                        + urine ((1−f_insensible))        [→ water-recovery system]
#
# respired_carbon_fraction (f_resp) — fraction of ingested food carbon respired as CO₂
#   (dimensionless), in [0, 1]. The remainder (1−f_resp) is egested as fecal solid carbon.
#   The SolarCharge η_c analogue applied to a MASS quantity. Most ingested carbon is
#   respired; the fecal fraction is the small remainder.
#
# insensible_water_fraction (f_insensible) — fraction of water intake leaving as
#   insensible/respiratory humidity + perspiration (dimensionless), in [0, 1]. The
#   remainder (1−f_insensible) leaves as urine.
#
# Forced (NOT donor-controlled): the three flows read intake RATES from env × dt and never
#   read a store amount, so there is no restoring force and no attractor — the stores just
#   deplete. Positivity is by WELL-FED SIZING (the mission is shorter than the closed-form
#   time-to-depletion store0/rate — the LoadDraw discipline), NOT structural. Because no
#   flow reads a stock, the forced-only RK4 ≡ Euler bit-identity holds (Crew revives it).
#
# Units discipline (P4 / config/units.py): neither fraction is a conserved-Quantity
#   canonical unit, so each is a schema-validated, bound-checked float carrying a declared
#   unit (exact-string guarded at the loader, like Power's charge_efficiency / ECLSS's
#   rates), NOT routed through pint.
#
# Clean-room: the fractional split of ingested carbon into respired CO₂ vs fecal loss, and
#   of water intake into insensible loss vs urine, is textbook human metabolism / mass
#   balance. As of Phase 6 Step 9 (the integrated-validation gate) both VALUES are
#   CALIBRATED to NASA BVAD Table 3-31 (Rev 2, 2022) — the deferred TODO(cite) debt comes
#   due here, before Step 10 freezes the station. Derivations (see docs/bvad-reference.md
#   and docs/plans/phase-6-station-integration.md Step 9):
#
#   respired_carbon_fraction (f_resp) — from the steady-body-mass carbon balance
#     C_food = C_CO₂ + C_feces (our model has exactly two carbon fates: respired CO₂ +
#     feces). C_CO₂ = BVAD CO₂ load 1.085 kg/CM-d ÷ 44.009 g/mol = 24.654 mol. C_feces =
#     BVAD fecal solid dry 0.032 kg/CM-d × 0.50 (carbon fraction of dry feces, 44–55 %,
#     [B]) ÷ 12.011 g/mol = 1.332 mol. f_resp = 24.654 / (24.654 + 1.332) = 0.949 (range
#     [0.944, 0.955] over the 44–55 % feces-carbon uncertainty).
#
#   insensible_water_fraction (f_insensible) — humidity vs urine of the two water fates
#     the model carries: BVAD resp+persp water 2.946 / (2.946 + urine 1.420) = 0.675.
#     (BVAD fecal water 0.101 kg/CM-d is excluded — the model has no fecal-water fate; and
#     BVAD metabolic water 0.490 kg/CM-d is not modeled — WaterBalance is intake-split
#     only. So this "water intake" is humidity + urine, NOT BVAD's potable-water figure.)
#
# NOTE — RQ = 1.0 is baked into CrewRespiration (PQ = 1: one O₂ consumed per CO₂ produced),
#   vs BVAD's nominal RQ 0.86 (daily-effective 0.881). Calibrating CO₂ to BVAD therefore
#   makes the model's O₂ consumption ≈ 11.8 % low — the one genuinely un-tuned structural
#   prediction, pinned in tests/test_bvad_validation.py. That miss is a documented model
#   limitation (a fixed RQ, no metabolic-water machinery), not a parameter error.
#
# Sources:
#   [A] Anderson, M.S., Ewert, M.K., Keener, J.F. (eds.) (2022), "Life Support Baseline
#       Values and Assumptions Document", NASA/TP-2015-218570 Rev 2, NASA JSC, Table 3-31
#       "Summary of Nominal Human Metabolic Interface Values", p. 58 (public domain, US
#       Government work). https://ntrs.nasa.gov/citations/20210024855
#   [B] Rose, C., Parker, A., Jefferson, B., Cartmell, E. (2015), "The Characterization of
#       Feces and Urine: A Review of the Literature to Inform Advanced Treatment
#       Technology", Critical Reviews in Environmental Science and Technology 45(17):
#       1827–1879 — carbon content of feces 44–55 % of dry solids (citing Feachem 1983);
#       the same review NASA BVAD Table 3-31 cites (ref. 5, "Rose 2015") for its fecal and
#       urine solid-waste values, so the two numbers are coherent.

name: crew
process: metabolic_split

parameters:
  respired_carbon_fraction:
    value: 0.949
    unit: "dimensionless"
    source: "NASA BVAD Table 3-31 [A] + feces carbon fraction [B]: from C_food = C_CO₂ + C_feces, f_resp = 24.654 / (24.654 + 1.332) = 0.949 (range [0.944, 0.955] over the 44–55% feces-carbon uncertainty). See docs/bvad-reference.md."
  insensible_water_fraction:
    value: 0.675
    unit: "dimensionless"
    source: "NASA BVAD Table 3-31 [A]: humidity vs urine of the two modeled water fates, 2.946 / (2.946 + 1.420) = 0.675 (fecal + metabolic water not modeled). See docs/bvad-reference.md."
