# chamber — minimal consumer (herbivory) first-order rate params (P3 Step 7)
# Currency/units: CARBON (mol) + OXYGEN (mol, the respiration leg). The one herbivore is
#   the codebase's existing minimal consumer (decomposition + microbial_respiration —
#   microbes eating DEAD litter) lifted one trophic level: it eats LIVE leaf_c and routes
#   its death to litter. Three first-order rates (1/day), each in its donor pool, close a
#   trophic sub-loop with no control code:
#     grazing_rate     leaf_c          → consumer_carbon   (graze live leaf into biomass)
#     respiration_rate consumer_carbon → carbon_pool (+O₂) (metabolic cost back to CO₂)
#     mortality_rate   consumer_carbon → litter_carbon     (death-to-litter, P3.4 / #6)
#   Each flux is first-order in its donor (rate · pool, mol C/day), self-limiting (→ 0 as
#   the pool → 0), so positivity is structural (rate·dt < 1 keeps the Euler backstop off).
#   consumer_carbon stabilises where intake == losses: consumer* = grazing·leaf /
#   (respiration + mortality), so the biomass TRACKS food availability — a genuine (if
#   simple) donor-controlled trophic response, the Decomposition/MicrobialRespiration
#   pattern one level up.
#
# The emergent cascade (Step-7 probe finding, direction-only — NOT a naive "litter up").
#   The consumer is a carbon RECYCLER/shunt: it grazes leaf and respires the bulk of its
#   intake straight back to CO2 (respiration > mortality), so vs a no-consumer baseline
#   leaf_c is LOWER (grazed), consumer_carbon > 0, and carbon_pool is HIGHER (the consumer
#   returns CO2 that photosynthesis would otherwise keep drawn down — the lighting-failure
#   "CO2 rises" signature, here from a respiring consumer). litter_carbon is actually
#   net-LOWER (carbon is shunted to CO2 via fast consumer respiration rather than
#   accumulating through the slower senescence path); death-to-litter is real as a FLUX
#   (the ConsumerMortality leg + the CONSUMERS->SOIL crossing are positive every step),
#   not as a higher stock level.
#
# Why first-order donor control, NOT a bilinear k·leaf·consumer functional response (the
#   honest part, advisor-reviewed). The predator-prey (Lotka-Volterra / Holling Type I)
#   form gives consumer-driven limit cycles — but that is the EXPLICITLY DEFERRED full
#   trophic-web / coupled-dynamics scope, and it would forfeit three load-bearing engine
#   properties: structural rationed == 0 (a bilinear leaf-withdrawal rate k·consumer·dt is
#   dynamic, not a fixed k·dt < 1); closure safety (a near-zero consumer could cross its
#   extinction threshold → route to the BOUNDARY loss-sink → break "genuinely closed");
#   and reset-guard safety (an amplifying graze draw makes it harder to keep the plant
#   filling grain for annual_reset). First-order is the established minimal idiom
#   (decomposition.yaml / senescence.yaml) and is exactly what Step 7 must prove — a
#   trophic LEVEL composes under conservation / closure / rationed == 0, not that it
#   oscillates. The bilinear/Holling response is a documented refinement seam.
#
# The O₂ self-limitation Michaelis factor f_O2 = x_O2/(K_O2 + x_O2) (o2_half_saturation
#   below; chamber.oxygen_limitation_factor) self-throttles consumer respiration on a
#   depleting O₂ pool — the microbial_respiration.yaml precedent. The perennial chamber is
#   ample-O₂ (210 mol), so f_O2 ≈ 1 here (low/sharp K_O2); it is load-bearing only as O₂
#   approaches its floor.
#
# Units discipline (P4 / config/units.py): the first-order rates (1/day) are NOT a
#   conserved-Quantity canonical unit, so each is a schema-validated, bound-checked float
#   carrying a declared unit (exact-string guarded at the loader, like decomposition's
#   decomposition_rate / microbial_respiration's m_resp / senescence's rdr_*). A zero rate
#   is valid (no grazing / no respiration / no mortality); negative is rejected.
#
# Deferred seams (documented in herbivory.py): the bilinear/Holling functional response;
#   assimilation efficiency < 1 (egesta/feces routed straight to litter rather than the 1:1
#   intake → biomass here); consumer phenology; and multiple consumer levels / full
#   trophic webs.
#
# Clean-room: values from cited primary literature ONLY. NOT from the unlicensed
#   WOFOST_crop_parameters YAML or PCSE source. See docs/param-file-conventions.md.
#   All numeric VALUES are provisional, literature-typical placeholders pending the
#   validation gate — flagged TODO(cite) until bound to a primary source.
#
# Sources:
#   [A] Lotka, A.J. (1925), "Elements of Physical Biology", Williams & Wilkins, Baltimore
#       (the linear functional response — first-order donor-controlled intake — and
#       first-order consumer mortality). The bilinear interaction term is the deferred
#       refinement; the donor-controlled limit is the minimal pick.
#   [B] First-order biomass respiration/turnover is the standard consumer/decomposer
#       treatment (e.g. the CENTURY-family microbial-pool turnover: Parton, W.J. et al.
#       (1987), Soil Sci. Soc. Am. J. 51:1173-1179) — here applied to the consumer pool.
#   [C] Longmuir, I.S. (1954), "Respiration Rate of Bacteria as a Function of Oxygen
#       Concentration", Biochem. J. 57(1):81–87. OPENED AND READ 2026-07-16 (round 2; it
#       was on the plan doc's "free but tooling-blocked" list — PMC hosts page images only,
#       but a text PDF was obtained). WHY IT MATTERS HERE: it does NOT give an animal
#       number, it gives the MECHANISM that makes this parameter's cross-kingdom copy
#       indefensible. Table 1 (p. 85) measures whole-cell apparent Km(O₂) across 9 bacteria
#       spanning 0.5–4.0 µm, and finds Km RISES WITH CELL SIZE: "the larger organisms
#       having a larger Km … the relationship is of the form Km = A·d^x, where A is the
#       proportionality factor, d is the cell diameter" (p. 86), fitted as a log-log line of
#       "slope 2.6032 and intercept of -7.0460", fiducial limits ±0.2605 in log Km. Km spans
#       1.10e-8 M (Micrococcus candicans, d = 0.5 µm) to 3.12e-6 M (B. megatherium in
#       glycine, d = 4.0 µm) — a 280× spread from CELL SIZE ALONE.
#       Longmuir's own conclusion (p. 86) is the load-bearing sentence: "It is obvious that
#       a variation of Km which is a function of size is not likely to be due to a variation
#       in the affinity of the respiratory enzymes for oxygen. An explanation based on
#       diffusion seems more probable." I.e. whole-cell apparent Km is largely a DIFFUSION
#       PATH-LENGTH artifact, not intrinsic enzyme affinity — so it is NOT transferable
#       between organisms of different size. That is exactly the operation that produced
#       this parameter (a ~1 µm soil bacterium's Km copied onto a grazing animal).
#       TABLE ALIGNMENT VERIFIED (the extraction collapses Table 1's columns, and a
#       misaligned row is this scope's known failure mode): the positional organism→(d, Km)
#       reading was checked against the paper's OWN published regression, and all 9 rows
#       reproduce Km = 10^-7.0460 · d^2.6032 within Longmuir's stated ±0.2605 fiducial band
#       (worst residual +0.119). A misaligned read could not regenerate the fitted line.

name: chamber
process: herbivory

parameters:
  grazing_rate:
    value: 0.004
    unit: "1/day"
    source: "DESIGN — behavioural choice, not a literature value: the donor-controlled linear functional response at ~0.4 %/day of standing leaf, SIZED (Step-7 probe) to keep the plant filling grain so annual_reset stays in the recoverable regime. The file said so all along; this tag stops promising a citation that cannot exist. No source can fix it — the parameter refers to NO REAL ORGANISM: it is a generic, unnamed consumer in an abstract chamber, so any literature rate that happened to bracket it would be coincidence, not provenance. Linear functional response form from [A]. Not calibrated."
  respiration_rate:
    value: 0.02
    unit: "1/day"
    source: "DESIGN — round-number choice, not a literature value: 0.02 = 1/50, i.e. a chosen ~50-day metabolic turnover, reverse-engineered from a tidy timescale rather than measured. Un-bindable in principle: real mass-specific metabolic rates are body-mass scaling relations (∝ mass^0.75, per individual), which do not reduce to a single 1/day biomass-turnover constant without naming a species and body size — which this model deliberately declines to do. First-order turnover form from [B]. NOTE the ratio respiration:mortality = 2:1 is load-bearing for the documented carbon-recycler cascade, while neither term is literature-bound. Not calibrated."
  mortality_rate:
    value: 0.01
    unit: "1/day"
    source: "DESIGN — round-number choice, not a literature value: 0.01 = 1/100, a chosen ~100-day consumer lifespan. Un-bindable for the same reason as respiration_rate — per-species mortality spans orders of magnitude with body size and trophic role, and this consumer is unnamed. Death-to-litter form from [A]. Not calibrated."
  o2_half_saturation:
    value: 0.0001
    unit: "mol/mol"
    source: "TODO(cite) — STILL OPEN, with a finding that CONTRADICTS the old tag, now MECHANISTICALLY EXPLAINED by a primary source (2026-07-16, round 2: [C] obtained and read). It was set by 'mirroring microbial_respiration.yaml' — but that mirroring crosses a KINGDOM BOUNDARY and is not physiologically justified: the consumer is an animal, so the soil-bacteria Km values that DO bind the microbial file (99–288 nM) cannot transfer. [C] supplies the REASON that transfer is invalid, which round 1 asserted but could not source: whole-cell apparent Km(O2) scales with organism SIZE as Km = A·d^2.6032 — a 280× spread across bacteria of 0.5–4.0 µm alone — because, in Longmuir's own words, it is a DIFFUSION artifact and 'not likely to be due to a variation in the affinity of the respiratory enzymes for oxygen'. An apparent Km is therefore a property of the diffusion path, not of respiration, and copying one across a ~5-order size gap (1 µm bacterium → grazing animal) is unsound in DIRECTION as well as magnitude: a larger organism must be LOOSER, never sharper. At the animal scale, mitochondrial effective Km is ≈ 0.49 µM ≈ 4e-4 mol/mol, so our 1e-4 is ~4× SHARPER than animal respiration warrants (and 1–2 orders sharper than typical intact-mitochondria P50, ~1.7–22 µM). ⚠ FALSE-VINDICATION TRAP IN [C], flagged deliberately: its pig-/ox-heart rows read 1.86e-8 and 2.39e-8 M (~19–24 nM) — SHARPER than our 123 nM — and could be misquoted as 'animal tissue is sharp, so 1e-4 is fine'. It is not: those are succinate-oxidizing heart-muscle PREPARATIONS (subcellular respiratory material with the diffusion barrier removed, carrying no cell diameter and excluded from the size regression), not intact animals. Comparing them to an organism-scale half-saturation is the very scale error [C] exists to demonstrate. STILL NOT bound to an animal source: a weak cross-kingdom bind is worse than an admitted gap. Behaviourally inert today (f_O2 ≈ 1 at the ample-O2 chamber fill) — it would bite only near anoxia, which is exactly where the 4× error lives. Changing it is calibration = scope B. See docs/plans/post-roadmap-citation.md."
