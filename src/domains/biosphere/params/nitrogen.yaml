# winter_wheat — nitrogen uptake + limitation (NITROGEN) crop params
# Currency/units: nitrogen is a NITROGEN flow (kg N). Uptake drains a depletable soil_n
#   POOL into plant_n (POOL); fertilization refills soil_n from an n_source BOUNDARY.
#   max_uptake_capacity is per ground area (kg N m⁻² day⁻¹), converted to an absolute
#   kg N/day leg by the scenario ground_area inside evaluate. The soil-N availability
#   thresholds (residual / critical) and ground_area are SCENARIO/soil data (flow args),
#   not crop params. The N-application rate is FORCING read through the source resolver.
#
# Units discipline (P4 / config/units.py): max_uptake_capacity (kg/m^2/day) is per-area
#   (NOT a conserved-Quantity canonical unit), so it is a schema-validated, bound-checked
#   float carrying a declared unit, exact-string guarded at the loader. The concentration
#   thresholds n_residual/n_critical are declared as kg N/kg DM (a dimensionless mass
#   ratio "kg/kg") and the loader folds them to kg N/mol C via × M_C/carbon_fraction (the
#   sla_per_mol_c precedent) so the pure core never holds the molar mass.
#
# carbon_fraction MUST equal canopy.yaml's value (Step-11 transition checklist item 3):
#   both files fold it (sla → m²/mol C here; N-thresholds → kg N/mol C), and divergent
#   values would model a silently inconsistent plant. The dedup of the duplicated entry
#   is the Step-4 deferred nicety; the consistency requirement is enforced at Step 11.
#
# Model (capacity-gated uptake + critical-N-dilution stress):
#   uptake   = max_uptake_capacity · soil_n_availability(soil_n)   (→ 0 at sn_residual)
#   f_N      = ramp( plant_n / biomass_c ; n_residual, n_critical )  (the photosynthesis
#              limiter, delivered standalone — wired into the Π fᵢ seam at Step 11)
#   Demand-deficit (WOFOST NDEMTO) uptake is a deferred, additive Step-11 seam.
#
# Clean-room: values from cited primary literature ONLY. NOT from the unlicensed
#   WOFOST_crop_parameters YAML or PCSE source. See docs/param-file-conventions.md.
#   All numeric VALUES are provisional, literature-typical placeholders pending the
#   Step-11 validation gate — flagged TODO(cite) until each is bound to a primary
#   source (never backfilled from WOFOST).
#
# PROVENANCE (post-roadmap bucket 3 scope C, 2026-07-16 — docs/plans/post-roadmap-citation.md).
#   The project's best-sourced biosphere file: THREE of four values CITED, one still open.
#     carbon_fraction     → CITED [B]  (essentially exact for wheat shoots)
#     n_critical          → CITED [A]  (on the verified curve — read the delta, it matters)
#     n_residual          → CITED [C]  (an empirical analogue; read the concept caveat)
#     max_uptake_capacity → STILL TODO(cite), with a finding — see its tag.
#
#   THE n_critical DELTA IS THE SUBSTANTIVE ONE, and it is a genuine modelling
#   simplification with a quantifiable cost. Critical N is NOT a constant in the
#   literature — [A] is a DILUTION CURVE, %N = 5.7·W^−0.5 for C3 crops (W in t/ha). Our
#   single constant 1.5 % equals that curve only at W = (5.7/1.5)² ≈ 14.4 t/ha, i.e. near
#   maturity for high-yielding winter wheat. Earlier in the season the curve sits far
#   above: ≈ 4.0 % at 2 t/ha (~2.7× ours), ≈ 2.5 % at 5 t/ha. CONSEQUENCE: a fixed 1.5 %
#   substantially UNDER-STATES critical N through early and mid season, so N limitation
#   triggers later than the Greenwood curve implies — or never. The constant is effectively
#   the late-season asymptote. (Validity caveat: [A]'s abstract states only the lower bound
#   W > 1 t/ha; whether 14.4 t/ha sits inside the fitted range is unconfirmed — the full
#   text is paywalled. See the plan doc's list.)
#
# Sources:
#   [A] Greenwood, D.J., Lemaire, G., Gosse, G., Cruz, P., Draycott, A. & Neeteson, J.J.
#       (1990), "Decline in percentage N of C3 and C4 crops with increasing plant mass",
#       Annals of Botany 66:425–436. https://academic.oup.com/aob/article/66/4/425/257815
#       (abstract verified 2026-07-16; full text paywalled). Abstract: "When W was greater
#       than 1 t ha−1, 86% of the variance in ln % N was removed by the model % N = a·W−b
#       with b = −0·5 for all crops, and a = 5·7% for C3 crops and 4·1 % for C4 crops."
#       (Quoted as rendered; the page's OCR shows "I t ha−1"/"In % N" for "1 t ha−1"/
#       "ln % N".) NOTE: this is the GENERIC C3 curve — the wheat-SPECIFIC curve (Justes
#       et al. 1994) is paywalled and unread; see the plan doc.
#   [B] Raimanova, I., Svoboda, P., Moulik, M., Wollnerova, J., Haberle, J. (2024), "The
#       Effect of Water Availability on the Carbon Content of Grain and Above- and
#       Belowground Residues in Common and Einkorn Wheat", Plants 13(2):181.
#       https://doi.org/10.3390/plants13020181 (open access; verified 2026-07-16).
#       Abstract: "On average, the C contents of grain, straw, chaff, and roots reached
#       45.0, 45.7, 42.6, and 34.9%, respectively." Discussion (naming our value outright):
#       "The average values of grains and straw were 45.05% (±0.81%) and 45.66% (±1.09%),
#       which are near to the value of 45% used for the calculation of C content in plant
#       dry mass; a general value of 50% is also used."
#   [C] Van Hecke, J., la Cour, R., Jørgensen, H., Schjoerring, J.K. (2020), "Residual
#       nitrogen pools in mature winter wheat straw as affected by nitrogen application",
#       Plant and Soil 453:561–575. https://doi.org/10.1007/s11104-020-04600-6 (abstract
#       verified 2026-07-16; full text paywalled). Results: "Total straw N concentration
#       increased from 0.29 to 0.69% with increasing level of N application" (five N levels,
#       60–280 kg N/ha).
#   [D] Meng, Q., Yue, S., Chen, X., Cui, Z., Ye, Y., Ma, W., Tong, Y., Zhang, F. (2013),
#       "Understanding Dry Matter and Nitrogen Accumulation with Time-Course for
#       High-Yielding Wheat Production in China", PLoS ONE 8(7):e68783.
#       https://doi.org/10.1371/journal.pone.0068783 (open access; verified 2026-07-16).
#       Results: "During this period, 2.44 kg N ha−1 accumulated per day and 61 kg N ha−1
#       accumulated in total. Moreover, 50 kg ha−1 N, with 0.7 kg N ha−1 per day,
#       accumulated from sowing to regreening; 38 kg ha−1 N, with 1.1 kg N ha−1 per day,
#       accumulated from regreening to stem elongation; and 37 kg ha−1 N, with 1.0 kg N
#       ha−1 per day, accumulated post-anthesis." CONTRAST for max_uptake_capacity.

name: winter_wheat
process: nitrogen

parameters:
  max_uptake_capacity:
    value: 0.0015
    unit: "kg/m^2/day"
    source: "TODO(cite) — STILL OPEN, with a measured finding (2026-07-16): 0.0015 kg/m²/day = 15 kg N/ha/day is ~6× the FASTEST period-average N accumulation reported for high-yielding wheat (2.44 kg N/ha/day at stem-elongation→anthesis; 0.7–1.1 in other stages) [D]. A period average understates the instantaneous peak, but not plausibly by 6×. The honest reading: this is a non-binding NUMERICAL SAFETY CEILING, not an empirical quantity — at ~6× realistic peak demand it essentially never becomes the active constraint. NOT relabelled DESIGN: nothing in the header says it was deliberately sized as a cap, so calling it a design choice would retrofit an intention. If it should ever bite, the realistic range is ~3–5 kg N/ha/day (0.0003–0.0005 kg/m²/day) — but changing it is calibration = scope B. See docs/plans/post-roadmap-citation.md."
  n_residual:
    value: 0.005
    unit: "kg/kg"
    source: "[C], Results: mature winter-wheat straw N spans 0.29–0.69 % across five N-application levels; our 0.5 % sits near the midpoint of that measured range. ROUND 2 (2026-07-16) — the FULL TEXT was obtained ([C] was #11 on the plan doc's retrieval list, whose open question was whether 0.5 % is right or ~0.3 %), and it CONFIRMS THE ROUND-1 INFERENCE AS MEASUREMENT. Round 1 reasoned from the abstract that 'a TRUE structural floor would sit nearer the low-N end (~0.29 %)' without being able to see which end of the range the low-N treatment sat at. It does: [C] p. 5, 'the concentration of residual N in the mature straw, i.e. N left after N remobilization to the grain, increased significantly from 0.29% at 60 kg N ha−1 up to 0.69% at 280 kg N ha−1' — the five levels run 60→280 kg N/ha, and residual N rises MONOTONICALLY with supply. So the lowest-N treatment IS the 0.29 % end, and our 0.5 % is ~1.7× that structural floor. ANSWER: as a mid-range typical residual, 0.5 % is well supported; as the HARD FLOOR this parameter actually is in the model, ~0.29 % is the better-evidenced number and ours is ~1.7× too high. CONCEPT CAVEAT (unchanged, do not overstate): [C] measures N REMAINING IN MATURE STRAW AFTER REMOBILIZATION — the empirical analogue of a structural floor, not a defined 'minimum below which tissue N cannot fall'; and the range is fertilizer-dependent (straw N rises 2.4× with N supply), so the observed residual is partly luxury uptake. [C] p. 2 also gives the wider literature range first-hand: 'The quantity of residual N normally constitutes 0.3 to 0.8% of the dry matter and has been observed to increase with increasing application of fertilizer N' — ours is mid-range there too. The bind STANDS; changing 0.5 → 0.29 is calibration = scope B."
  n_critical:
    value: 0.015
    unit: "kg/kg"
    source: "[A], now confirmed against the FULL TEXT, not just the abstract (2026-07-16, round 2 — [A] was #10 on the plan doc's retrieval list): the C3 critical-N dilution curve is %N = 5.7·W^−0.5 (W in t/ha), 86 % of variance in ln %N, validity stated for W > 1 t/ha. The full text confirms the abstract verbatim, so the round-1 bind stands unchanged. DELTA (substantive, unchanged): critical N is NOT a constant in the literature — it declines with crop mass. Ours equals the curve only at W ≈ 14.44 t/ha (near maturity); at 2 t/ha the curve gives ≈ 4.0 % (~2.7× ours) and at 5 t/ha ≈ 2.5 %. So a fixed 1.5 % UNDER-STATES critical N through early/mid season and makes N limitation trigger late or never — it is effectively the late-season asymptote. ROUND-2 ANSWER to the round-1 'unconfirmed' — IS 14.4 t/ha INSIDE [A]'s FITTED RANGE? YES, BUT ONLY JUST, AND THAT IS THE POINT: [A] Table 1's per-crop 'Range of W' column tops out at 14.59 t/ha, so our 14.44 sits at ~99 % of the database's maximum extent, a margin of ~0.15 t/ha. The bind is therefore valid and NOT an extrapolation — but our constant reproduces the curve only at the single most extreme biomass Greenwood ever fitted, which quantifies 'late-season asymptote' rather than merely asserting it. ⚠ READING CAVEAT: only 9 of Table 1's 15 crop rows extracted cleanly (column collapse), so 14.59 is a floor on the true database maximum, not necessarily the maximum; and the 9 ranges could not be reliably attributed to named crops, so no per-crop claim is made here. The crop-specific b coefficients [A] reports were NOT read — that table is too mangled to quote, and a guessed coefficient is exactly this scope's forbidden move. STILL OPEN: [A] is the generic C3 curve pooled across species, not the wheat-specific one (Justes 1994 — SUPPLIED in round 2 but an image-only scan, still unread; see the plan doc)."
  carbon_fraction:
    value: 0.45
    unit: "dimensionless"
    source: "[B], Discussion: measured wheat C content is 45.05 % (±0.81) in grain and 45.66 % (±1.09) in straw, which the paper states are 'near to the value of 45% used for the calculation of C content in plant dry mass'. Essentially exact for above-ground dry matter — the project's single strongest bind. DELTA: [B] measures ROOTS at 34.9 %, ~10 points below shoots, so wherever this fraction is applied to root biomass it overestimates root C by ~29 %. MUST match canopy.yaml (transition checklist item 3)."
