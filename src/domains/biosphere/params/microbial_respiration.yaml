# chamber — microbial respiration (first-order rate) decomposer gas-flux params
# Currency/units: CARBON + OXYGEN (mol). Microbial respiration burns microbial biomass
#   back to CO₂ consuming O₂: microbial_C + O₂ → CO₂, a first-order rate (1/day) in the
#   standing microbial biomass, resp = m_resp · microbial_C (mol C/day). Self-limiting
#   (→ 0 as microbial → 0), so positivity is structural. At PQ=1 each mol C respired
#   returns 1 mol CO₂ to the pool (2 oxygens) and consumes 1 mol O₂ (those 2 oxygens) —
#   a genuine multi-quantity flow (the P2.1 composition fold balances CARBON and OXYGEN).
#   This closes the carbon loop (litter → microbial → CO₂ → photosynthesis) and is the
#   chamber's decomposer O₂ sink (the Biosphere-2 soil-respiration mechanism).
#
# Units discipline (P4 / config/units.py): the first-order rate (1/day) is NOT a
#   conserved-Quantity canonical unit, so it is a schema-validated, bound-checked float
#   carrying a declared unit (exact-string guarded at the loader, like decomposition's
#   decomposition_rate / senescence's rdr_*). A zero rate is valid (no respiration —
#   microbial biomass would only grow, the Step-4 behaviour).
#
# The O₂ self-limitation Michaelis factor f_O2 = x_O2/(K_O2 + x_O2) is BUILT at Step 7
#   (o2_half_saturation below; chamber.oxygen_limitation_factor), applied here and to the
#   plant maintenance shortfall so respiration self-throttles on a depleting O₂ pool.
#
# Deferred seams (documented in microbial_respiration.py): microbial death/turnover as
#   microbial_C → litter_C recycling, and microbe-explicit substrate Michaelis kinetics
#   (Vmax · microbial_C · litter/(K_m + litter)).
#
# Clean-room: values from cited primary literature ONLY. NOT from the unlicensed
#   WOFOST_crop_parameters YAML or PCSE source. See docs/param-file-conventions.md.
#   All numeric VALUES are provisional, literature-typical placeholders pending the
#   Phase-2 validation gate — flagged TODO(cite) until bound to a primary source.
#
# Sources:
#   [A] Parton, W.J., Schimel, D.S., Cole, C.V. & Ojima, D.S. (1987), "Analysis of factors
#       controlling soil organic matter levels in Great Plains grasslands", Soil Sci. Soc.
#       Am. J. 51:1173–1179 — the CENTURY model description. OPENED AND READ 2026-07-16
#       (previously "primary citation pending"; it was #1 on the plan doc's retrieval list).
#       p. 1174 defines "K_i = the maximum decomposition rate parameter (per week) for the
#       ith state variable (K_i = 0.076, 0.28, 0.094, 0.35, 0.14, 0.0038, and 0.00013)"
#       over the 7 state variables (surface structural/metabolic, soil structural/metabolic,
#       active, slow, passive SOM). So K5 = 0.14 week⁻¹ = the ACTIVE SOM pool — defined
#       p. 1173 as "an active fraction (active SOM) of soil C and N consisting of live
#       microbes and microbial products, along with soil organic matter with a short
#       turnover time (1-5 yr)". = 0.02/day = 7.3/yr, MAXIMUM (unmodified).
#       INDEX ALIGNMENT VERIFIED three ways (the list is positional, and a misread row is
#       this scope's known failure mode): (i) p. 1176 names K6 outright — "The decay rate
#       for the slow SOM pool (K6 = 0.0038 week⁻¹)" — matching position 6; (ii) Eq. [5]
#       p. 1176 modifies K5 as "the decay rate of active SOM", matching position 5;
#       (iii) p. 1174's "decay rates for the soil surface litter are 20% lower than the
#       soil litter" holds EXACTLY on the positional reading — K1/K3 = 0.076/0.094 = 0.809
#       and K2/K4 = 0.28/0.35 = 0.800.
#       Also RothC: Jenkinson, D.S. (1990), "The turnover of organic carbon and nitrogen in
#       soil", Phil. Trans. R. Soc. Lond. B 329:361–368 — FORM only; the per-pool constants
#       are NOT in that paper, they are in [E].
#   [B] Davidson, E.A., Samanta, S., Caramori, S.S. & Savage, K. (2012), "The Dual
#       Arrhenius and Michaelis–Menten kinetics model for decomposition of soil organic
#       matter at hourly to seasonal time scales", Global Change Biology 18:371–384 (the
#       Michaelis–Menten O₂-limitation form for respiration). OPENED AND READ 2026-07-16
#       (round 2 — it was #9 on the plan doc's retrieval list; round 1 could not open it,
#       the free Harvard Forest copy being an image-only CCITTFax scan. A text copy was
#       supplied). FORM ONLY — the round-1 verdict SURVIVES, and is now exact rather than
#       estimated.
#       THE VALUE: p. 377, "The value used for kMO2 (0.121 cm³ O2 cm⁻³ air)". As a gas
#       volume fraction this is directly comparable to our mole fraction (ideal gas), so
#       ours (1e-4) is 1210× SHARPER — i.e. 3.08 orders. EVERY ROUND-1 ESTIMATE IS
#       CONFIRMED TO THE DIGIT, which is worth recording because they were inferences from
#       secondary description: round 1 said "~3 orders LOOSER" (actual 3.08), "~1200×"
#       (actual 1210×), "~150 µM" (actual 149 µM dissolved-equivalent), and "~58 % of air
#       saturation" (actual 58 %). The inference chain was sound.
#       ⚠ THE REAL FINDING — kMO2 IS NOT AN AFFINITY MEASUREMENT AT ALL, which is a
#       STRONGER reason it cannot bind ours than the scale argument round 1 made. The same
#       sentence continues: it "is the value of [O2] according to Eqn (6) at the mean value
#       of soil moisture (0.229 cm³ H2O cm⁻³ soil) in 2009 at this site." Davidson SET the
#       half-saturation constant equal to the modelled ambient O₂ at his site's mean soil
#       moisture — a calibration convention that places the O₂ term near 0.5 at the
#       operating point. It is therefore site- and model-specific bookkeeping, not a
#       measured property of any organism or enzyme, and it could not license ANY
#       physiological Km — ours or anyone's. (Consistently, kMO2 appears in none of the
#       paper's fitted-parameter tables; only aSx, EaSx and kMSx are calibrated.)
#       So: a 0-D well-mixed chamber has no diffusion barrier AND [B]'s constant is not an
#       affinity anyway — the cellular scale [C]/[D]/[G] is the right pick on both counts.
#       The pre-2026 header's concession ("our chamber uses a sharper intrinsic-affinity
#       Km") is CORRECT and stands.
#   [C] Trojan, D., Garcia-Robledo, E., Meier, D.V., Hausmann, B., Revsbech, N.P.,
#       Eichorst, S.A., Woebken, D. (2021), "Microaerobic lifestyle at nanomolar O₂
#       concentrations mediated by low-affinity terminal oxidases in abundant soil
#       bacteria", mSystems 6(4):e00250-21. https://doi.org/10.1128/mSystems.00250-21
#       (open access; verified 2026-07-16). Whole-cell APPARENT Km(app) for O₂ of soil
#       Acidobacteria: 166 ± 11, 250 ± 5, 113 ± 24, 288 ± 34, and 37 ± 2 nmol O₂ liter⁻¹.
#   [D] Stolper, D.A., Revsbech, N.P., Canfield, D.E. (2010), "Aerobic growth at nanomolar
#       oxygen concentrations", PNAS 107(44):18755–18760 (verified 2026-07-16). Results,
#       "Growth Under Oxygen-Limiting Conditions": "we obtained a best-fit Ks value of
#       121 ± 20 nM O2" (Escherichia coli K-12) — an independent corroboration within ~2 %
#       of our value.
#   [E] Coleman, K. & Jenkinson, D.S., "RothC — A model for the turnover of carbon in soil.
#       Model description and users guide (Windows version)", Rothamsted Research,
#       Harpenden (updated June 2014). PRIMARY, OPENED AND READ 2026-07-16 — this REPLACES
#       the pre-2026 header's FAO (2004) secondary, which merely reported these constants.
#       §1.5 "Decomposition rate constants", p. 10: "The decomposition rate constants (k),
#       in years⁻¹, for each compartment are set at: DPM : 10.0 / RPM : 0.3 / BIO : 0.66 /
#       HUM : 0.02", and §1.3 p. 9 names BIO as "Microbial Biomass" — i.e. BIO = 0.66/yr is
#       the constant for a pool that IS, by name and definition, ours. §1.4 p. 9 confirms
#       the modifiers multiply k: a compartment "declines to Y·e^(−abckt)", where a is
#       temperature, b moisture, c soil cover — each ≤ 1, so the REALIZED rate is at or
#       below k. p. 10 also notes the values "were originally set by tuning the model to
#       data from some of the long-term field experiments at Rothamsted (Jenkinson et al
#       1987; Jenkinson et al 1992) : they are not normally altered when using the model."
#   [F] CLM5 Technical Note, "Decomposition" — the CENTURY-based pool structure, stated to
#       follow Parton et al. (1988). Table 2.21.3 (turnover times at a 25 °C reference):
#       "SOM 1 (active) | 0.17 year" and "Litter 1 (metabolic) | 0.066 year".
#       https://escomp.github.io/CTSM/release-clm5.0/tech_note/Decomposition/CLM50_Tech_Note_Decomposition.html
#       SECONDARY (an implementation of Parton) and CONTRAST only. Now corroborated by the
#       primary [A] it implements (7.3/yr vs CLM5's 5.9/yr — same order, CLM5 slightly slower).
#   [G] Longmuir, I.S. (1954), "Respiration Rate of Bacteria as a Function of Oxygen
#       Concentration", Biochem. J. 57(1):81–87. OPENED AND READ 2026-07-16 (round 2).
#       Table 1, p. 85: whole-cell apparent Km(O₂) for 9 bacteria, 1.10e-8 M (Micrococcus
#       candicans) to 3.12e-6 M (B. megatherium in glycine) — i.e. 11–3120 nM. Our 123 nM
#       sits inside that span, a THIRD independent bracket for o2_half_saturation.
#       ⚠ BUT IT ALSO TEMPERS [D]. Longmuir's E. coli Km is 2.22e-8 M = 22.2 nM, whereas
#       [D]'s E. coli Ks is 121 ± 20 nM — TWO PRIMARY MEASUREMENTS OF THE SAME ORGANISM
#       THAT DISAGREE BY ~5.5×. So the pre-round-2 tag's "within ~2 % of [D]" is true but
#       must NOT be read as 2 % accuracy: it is agreement with one of two available E. coli
#       numbers, and the real inter-study spread for a single species is several-fold.
#       Per [G] p. 86 the spread is expected — apparent Km scales as ~d^2.6 and is a
#       diffusion artifact, so it is method- and condition-sensitive, not a constant of the
#       organism. The bind survives (ours is inside every measured bacterial span); the
#       CONFIDENCE claim is what changes.
#
# PROVENANCE (post-roadmap bucket 3 scope C, 2026-07-16 — docs/plans/post-roadmap-citation.md).
#   Split outcome — one CITED, one still OPEN:
#
#   o2_half_saturation → CITED [C] + [D]. Our 1e-4 mol/mol ≈ 123 nM dissolved (via
#     x = 0.2095 × C/258 µM at air saturation, 25 °C; cross-checked against Henry's law,
#     H_cp ≈ 1.3e-3 mol L⁻¹ atm⁻¹ → 9.5e-5, the two routes agreeing within ~5 %). That sits
#     INSIDE [C]'s measured soil-bacteria band (99–288 nM) — essentially on top of the
#     113 ± 24 nM organism — and within 2 % of [D]'s E. coli Ks. Caveat kept deliberately:
#     the sources report nM and the mole-fraction conversion is OURS, which caps confidence.
#     TERMINOLOGY FIX: the pre-2026 header called this a "terminal-oxidase Km"; the
#     bracketing values are WHOLE-CELL APPARENT Km. Isolated oxidase is far sharper
#     (3–8 nM). "Whole-cell respiratory O₂ affinity" is the accurate description.
#
#   microbial_respiration_rate → STILL TODO(cite), with a finding. See its tag.
#
#   THE SCALE GAP, recorded because it is what makes [B] un-bindable and is easy to
#   re-litigate: isolated oxidase 3–8 nM ≪ whole-cell/community apparent ~24–391 nM ≪
#   soil/aggregate model scale 149 µM (58 % of air saturation) — 3.08 orders end to end.
#   Km values for O₂ are only comparable WITHIN a scale; ours is cellular.
#   ROUND 2: the top of that ladder is now EXACT, read from [B] itself (kMO2 = 0.121 cm³ O₂
#   cm⁻³ air), not inferred — and round 1's inferred "~150 µM / ~58 % / ~3 orders" all
#   land on the measured figures. [G] additionally shows the MIDDLE rung is not a single
#   scale either: whole-cell apparent Km itself spans 280× with cell size alone (~d^2.6),
#   because it too is diffusion-limited. The ladder is a continuum of diffusion path
#   lengths, not three discrete tiers.

name: chamber
process: microbial_respiration

parameters:
  microbial_respiration_rate:
    value: 0.05
    unit: "1/day"
    source: "TODO(cite) — STILL OPEN, and the finding is now PRIMARY-BACKED at both ends (2026-07-16, round 2: [A] and [E] were obtained and read; round 1 had only secondaries). 0.05/day = 18.25/yr is ABOVE EVERY published constant for a nominally-microbial pool, but HOW FAR depends on which pool is the analogue, and the two canonical lineages disagree by ~11× on that: vs RothC's BIO = 0.66/yr [E] — a pool named 'Microbial Biomass', the strict analogue — ours is ~28× fast; vs CENTURY's active SOM, K5 = 0.14/wk = 7.3/yr MAXIMUM [A] — 'live microbes and microbial products' plus short-turnover SOM, a broader/faster pool — ours is ~2.5× fast. CLM5's 5.9/yr [F] corroborates [A] independently (~3.1×). THE 11× SPREAD IS ITSELF THE FINDING: 'the microbial pool' is not one thing, so 2.5× and 28× are both honest and neither is THE answer. BOTH ARE RECORDED DELIBERATELY — picking the 2.5× anchor because it flatters the value would be the same re-anchoring trap this scope refused for decomposition_rate (a value defended by redefining what the parameter means). Every comparison here UNDERSTATES the gap: [E] §1.4 applies a·b·c ≤ 1 on top of k, and [A] Eq. [5] further cuts K5 by texture (K5·(1−0.75·T); a T=0.5 loam gives 4.6/yr ⇒ ours ~4.0×). Round 1's '3–28×' becomes ~2.5–28×. Changing the value is calibration = scope B. See docs/plans/post-roadmap-citation.md."
  o2_half_saturation:
    value: 0.0001
    unit: "mol/mol"
    source: "[C] + [D] + [G]: our 1e-4 mol/mol ≈ 123 nM dissolved sits INSIDE the measured whole-cell apparent Km(app) band for soil bacteria (99–288 nM [C], essentially on top of the 113 ± 24 nM organism), within ~2 % of the 121 ± 20 nM E. coli Ks [D], and inside the 11–3120 nM span across 9 bacteria in [G]. ⚠ CONFIDENCE CAVEAT (round 2, from [G]): do NOT read the '~2 %' as accuracy — [G] measures the SAME organism (E. coli) at 22.2 nM, 5.5× from [D], so a single-species apparent Km carries several-fold inter-study spread by nature ([G] p. 86: it scales as ~d^2.6 and is a diffusion artifact, not an organism constant). The bind survives — ours is inside every measured bacterial span — but it is a bracket, not a match. Low/sharp is CORRECT here and the reason is structural: a 0-D well-mixed chamber has no soil-microsite diffusion limitation, so the cellular respiratory O2 affinity governs — NOT the soil/aggregate-scale constant (kMO2 = 0.121 mol/mol = 149 uM-equivalent, exactly 1210x looser, read from [B] in round 2) that [B] models. [B]'s constant is doubly inapplicable: besides the scale, it is not an affinity at all — Davidson SET it equal to the modelled ambient O2 at his site's mean soil moisture, a calibration convention rather than a measurement. f_O2 ~ 1 until near-anoxia. CAVEATS: the sources report nM and the mole-fraction conversion is ours; and this is a WHOLE-CELL apparent Km, not the 'terminal-oxidase Km' the pre-2026 tag claimed (isolated oxidase is sharper still, 3-8 nM)."
