# chamber — nitrogen return loop (senescence-N shedding + net mineralization) params
# Currency/units: NITROGEN (kg N). This file groups the TWO first-order rates (1/day)
#   that close the chamber's nitrogen cycle — the N analogue of the carbon decomposer
#   loop (decomposition.yaml + microbial_respiration.yaml):
#     n_senescence_rate   plant_n  → litter_n   (dead-plant N enters the litter)
#     mineralization_rate litter_n → soil_n     (net mineralization back to mineral N)
#   With uptake (nitrogen.yaml) this closes the loop soil_n → plant_n → litter_n →
#   soil_n that Phase 1 fed externally from an n_source BOUNDARY (fertilization).
#   Both fluxes are first-order in their donor pool (rate · pool, kg N/day),
#   self-limiting (→ 0 as the pool → 0), so positivity is structural.
#
# Why both rates live in ONE file (advisor-reviewed). Conceptually the shedding is a
#   plant (senescence) process and mineralization is a soil process — the carbon side
#   keeps senescence (allocation.py) and decomposition (decomposition.py) separate. They
#   are grouped here because together they ARE the chamber's nitrogen return loop, and a
#   dedicated file keeps the carbon senescence params (senescence.yaml / SenescenceParams)
#   byte-untouched (the surgical / golden-safe choice — the open-field carbon path is
#   unchanged). The file is named honestly for the loop, not for one of its two halves.
#
# Why first-order in plant_n (not tied to the carbon-senescence flux). N-shedding is a
#   plain first-order relative rate on the whole-plant plant_n POOL (the carbon-senescence
#   self-limiting pattern). The alternative — shedding N in lockstep with carbon
#   senescence at a fixed tissue N:C — would *control* the litter C:N ratio; here the
#   litter C:N (litter_carbon / litter_n) is instead **emergent** from two independent
#   first-order rates. The simpler decoupled pick is the JIT-minimal Step-6 choice; an
#   N:C-coupled shedding (and N resorption before abscission, which this model neglects —
#   all standing plant N is shed) are documented refinement seams.
#
# Units discipline (P4 / config/units.py): the first-order rates (1/day) are NOT a
#   conserved-Quantity canonical unit, so each is a schema-validated, bound-checked float
#   carrying a declared unit (exact-string guarded at the loader, like decomposition's
#   decomposition_rate / microbial_respiration's m_resp / senescence's rdr_*). A zero rate
#   is valid (no shedding / no mineralization); negative is rejected (it would create N).
#
# Deferred seams (documented in mineralization.py): microbe-mediated N (immobilization
#   litter_n → microbial_n during decomposition, then microbial_n → soil_n) vs this
#   DIRECT net first-order litter_n → soil_n mineralization; C:N-ratio-driven
#   immobilization/mineralization; N resorption; and the N-limited regime where f_N < 1
#   becomes load-bearing (Step 7's sized multi-year run — at the PP fill plant_n stays
#   ~1000× above the critical-N concentration, so f_N ≡ 1 and the loop is mechanism-only,
#   with zero effect on the carbon trajectory; mirrors the f_O2 deferral).
#
# Clean-room: values from cited primary literature ONLY. NOT from the unlicensed
#   WOFOST_crop_parameters YAML or PCSE source. See docs/param-file-conventions.md.
#   All numeric VALUES are provisional, literature-typical placeholders pending the
#   Phase-2 validation gate — flagged TODO(cite) until bound to a primary source.
#
# Sources:
#   [A] Stanford, G. & Smith, S.J. (1972), "Nitrogen mineralization potentials of soils",
#       Soil Science Society of America Journal 36(3):465–472 (first-order net N
#       mineralization kinetics; the mineralization rate constant). STILL NOT OPENED —
#       it was #6 on the plan doc's retrieval list. ⚠ UPDATED BY ROUND 4 (2026-07-20): it is
#       no longer "one of three items not supplied"; Dunn 2011 and Divya 2009 WERE supplied
#       and opened in round 4, so [A] is now the SOLE remaining item on that list
#       (12 → 3 → 1). It stays on it.
#       ROUND-2 NEGATIVE RESULT, recorded so the search is not repeated: a 29-source
#       literature corpus was searched for any first-hand mineralization rate constant that
#       could replace the [C]-quoting-[A] chain, and there is none. [D] — a dedicated
#       review AND meta-analysis of N mineralization, the single most likely substitute —
#       cites [A] for the first-order form (p. 163) and never reproduces its k. Luo & Smith
#       (2022), "Land Carbon Cycle Modeling", likewise cites [A] for form only ("Generally,
#       first-order kinetics are used to simulate soil carbon cycling (Stanford and Smith
#       1972 …)"). Four soil texts/monographs in the corpus contain no mineralization rate
#       constant at all. CONCLUSION: k = 0.054 wk⁻¹ is reachable ONLY from [A] itself;
#       secondary literature propagates [A]'s FORM and quotes its mean without republishing
#       the underlying per-soil data. Retrieval of [A]'s k remains the only upgrade path
#       FOR THE VALUE — but see [E]: round 3 (2026-07-20) showed that sentence was too broad
#       as originally written ("retrieval of [A] remains the only upgrade path"). [A]'s
#       CONDITIONS were upgradable without [A], via an author's own retrospective.
#   [E] Smith, S.J. (1987), "This Week's Citation Classic: Stanford G & Smith S J, Nitrogen
#       mineralization potentials of soils", Current Contents, CC/NUMBER 28, July 13 1987,
#       p. 20 (ISI). OPENED AND READ 2026-07-20 (round 3). Open access, page images:
#       https://garfield.library.upenn.edu/classics1987/A1987H917300001.pdf
#       WHAT IT IS: a first-person retrospective written by S.J. Smith — [A]'s own second
#       author — about [A]. That makes it AUTHOR TESTIMONY ABOUT the paper, which is
#       stronger than a third-party paraphrase for the claims it actually makes, but it is
#       NOT the paper and NOT its data table. It does not supersede [A] on the retrieval
#       list, and [A] stays there.
#       ⚠ IT DOES NOT GIVE k. No rate constant appears anywhere in it — so the 0.054 wk⁻¹
#       figure remains reachable only through [C] quoting [A], exactly as round 2 recorded.
#       The value provenance is UNCHANGED by round 3.
#       ⚠ CITATION CORRECTION IT SETTLES — [A]'s AS-PUBLISHED VENUE. [E]'s printed header
#       gives "Soil Sci. Soc. Amer. Proc. 36:465-72, 1972" — *Proceedings*, not *Journal*.
#       SSSAJ carried the name "Soil Science Society of America Proceedings" until 1976, so
#       the [A] entry above (and the plan doc's retrieval list) cite a 1972 paper under a
#       title it did not yet have. The DOI is unaffected and resolves under the modern name,
#       so this is a cosmetic-but-real provenance error of exactly the kind an unopened
#       citation accumulates. Recorded rather than silently rewritten: [A]'s own line is left
#       as-is because that is how every secondary in this file cites it, and changing it
#       would desynchronize us from [C] and [D]. Anyone quoting [A] as PRIMARY should use
#       the Proceedings form.
#       WHAT IT DOES GIVE — first-hand confirmation of the experimental conditions that the
#       FINDING below rests on, previously known only through [C]: "an incubation procedure
#       conducted at optimum temperature (35° C) and moisture conditions (approximate field
#       capacity)"; "For 39 widely differing soils"; "We continued the incubation for 30
#       weeks using leaching intervals first of two and two weeks, then four, four, and six
#       weeks, then six weeks, and finally eight weeks" (leached with 0.01 M CaCl2); and the
#       form, "nitrogen mineralization obeyed simple first-order kinetics", with N0 taken
#       from the best linear fit of log(N0-Nt) vs t.
#       WHY THAT MATTERS: the FINDING's load-bearing clause is that S&S's rates are ALREADY
#       optimal-condition potential rates, which is what forbids explaining our ~3.9x gap
#       away with temperature/moisture modifiers. That clause was [C]-mediated; it is now
#       confirmed by an author of [A]. The gap argument no longer depends on a secondary
#       for its premise — only for its number.
#       ALSO NEW (first-hand, unavailable before): "values of N0 ranged from about 20 to
#       over 300 mg kg-1 air-dry soil". This is a POOL SIZE, not a rate — it binds nothing
#       here and must not be quoted as if it did; recorded because it is [A] data we now
#       hold directly.
#       QUOTE VERIFICATION (the round-1 lesson, applied): every fragment above was
#       re-checked against the page IMAGE fragment-by-fragment after first transcription,
#       because eye-reading a scan is precisely how round 1 produced its one real error (the
#       BVAD wheat figure read off the soybean row). The re-read corrected three things: the
#       printed spacing "35° C" (transcribed "35°C"); a citation recorded from a HANDWRITTEN
#       archival scrawl on the scan ("CC/AB+ES") rather than the printed header ("CC/NUMBER
#       28"); and it surfaced the Proceedings/Journal correction above. It also CONFIRMED a
#       fragment flagged as suspect — "leaching intervals" is genuinely printed, hyphenated
#       across a line break as "leaching in-/tervals", not an inserted word.
#       ROUND-3 NEGATIVE RESULTS, recorded so the search is not repeated: [A] itself was
#       re-attempted and is still Wiley-paywalled — THIS HALF STANDS.
#       ⚠ THE OTHER HALF WAS FALSIFIED BY ROUND 4, ONE DAY LATER, and is corrected in place:
#       round 3 wrote that "Dunn 2011 (Science) and Divya 2009 (Elsevier; DTU Orbit is
#       metadata-only) were re-attempted and are still closed". BOTH WERE SUPPLIED BY THE
#       USER AND OPENED in round 4, and opening them found a CONFIRMED FALSE ATTRIBUTION in
#       power/self_discharge.yaml (Dunn contains no self-discharge figure at all). So round
#       3's "the round-1 ceiling is confirmed" was true of [A] and WRONG about the other two
#       — a retrieval ceiling is a fact about one afternoon's access, not a property of the
#       source, and recording it as a flat negative made it read like the latter. That is
#       this scope's own meta-finding again, and the reason this line is corrected rather
#       than left as period detail: a stale negative result actively SUPPRESSES a search.
#       The USDA-NRCS "Potentially
#       Mineralizable Nitrogen" tech note was attempted twice and both fetches failed at the
#       network layer; it is a SECONDARY anyway (NRCS-quoting-[A] is the same chain problem
#       as [C]-quoting-[A]), so it could not have bound the value had it loaded.
#   [B] Penning de Vries, F.W.T., Jansen, D.M., ten Berge, H.F.M. & Bakema, A. (1989),
#       "Simulation of Ecophysiological Processes of Growth in Several Annual Crops",
#       Simulation Monographs 29, PUDOC, Wageningen. OPENED AND READ 2026-07-16 (round 2).
#       It was #2 on the plan doc's retrieval list, predicted to be "the only clean-room-safe
#       route" that would "settle the one param with no accessible support".
#       ⚠ IT DOES NOT SETTLE IT — the prediction was WRONG, and the reason is worth keeping:
#       THE BOOK HAS NO NITROGEN-SHEDDING RATE TO GIVE. Its senescence treatment (§3.2.6,
#       p. 95) is about LEAF BIOMASS death, not N transfer. It names N remobilization as a
#       distinct and unquantified process — "nutrient remobilization, in particular
#       nitrogen, often plays a crucial role. The fundamental processes involve
#       physiological ageing and protein (enzyme) breakdown. These processes are difficult
#       to quantify" — which CORROBORATES round 1's diagnosis first-hand: N resorption is
#       not published in the shape (1/day) this parameter needs. Retrieval cannot fix that.
#       WHAT IT DOES GIVE — the FORM, and a structural mismatch with ours. p. 95 offers two
#       treatments: a descriptive one where "the relative rate of loss is a function of the
#       development stage", and a mechanistic one "setting the death rate of leaves and
#       roots to a certain fraction per day once the conditions for growth deteriorate".
#       BOTH are DS- or condition-dependent; OURS IS A BARE CONSTANT, i.e. the degenerate
#       case of the book's function. So even the FORM citation is partial — a fact round 1
#       could not have known without opening the book.
#       Its own numeric example of that function (p. 113, exercise T10) is a leaf relative
#       death rate FUNCTION LLVT = 0.0/day at DS 0–1.0, 0.03/day at DS 1.5, 0.15/day at
#       DS 2.0 — i.e. ZERO until anthesis, then a steep ramp. Ours (0.01/day, flat) is
#       therefore non-zero where the book is zero and 3–15× slower where the book is fast.
#       ⚠ THAT IS A SCALE NOTE, NOT A DELTA, and must not be quoted as one: LLVT is leaf
#       BIOMASS death in RICE, ours is N shedding in wheat — different currency, different
#       crop. The book adds (p. 95) that such numbers "should be calibrated to mimick
#       specific situations". No delta is computable; the round-1 tag's claim stands.
#       OCR NOTE: the p. 113 listing text is badly mangled ("PUNCTION LLVT = 020., 1.,0:,
#       1:5,0.03; 2-,0.15"). The reading above was VERIFIED by arithmetic, not guessed —
#       T10 states the pattern it reproduces ("The reproductive period lasts about 30 days.
#       In the first 15 days, loss is 20%, in the second 15 days 75% of what remained"), and
#       integrating the reconstructed table gives 20.1% and 74.1%. No other digit reading
#       reproduces both.
#       CLEAN-ROOM: this is a printed 1989 monograph — published literature, NOT the EUPL
#       PCSE source and NOT the unlicensed WOFOST_crop_parameters YAML repo. Citing its
#       printed prose/table is "cite the paper, not PCSE" (docs/reuse-and-licenses.md).
#   [C] Schomberg, H.H., et al. (2009), "Assessing Indices for Predicting Potential
#       Nitrogen Mineralization in Soils under Different Management Systems", Soil Science
#       Society of America Journal 73:1575–1586. USDA-ARS public copy, verified 2026-07-16:
#       https://www.ars.usda.gov/ARSUserFiles/35278/Schomberg%20et%20al%202009%20SSSAJ%2073%201575-1586.pdf
#       p. 1581: "Values of k ranged from 0.018 wk−1 for the 5- to 15-cm depth of the
#       Pullman soil in stubble mulch tillage to 0.174 wk−1 for the 0- to 5-cm depth of the
#       Bama soil in no-till with non-inversion deep tillage. The average k for all soils
#       was 0.070 wk−1. This is similar to the average k of 0.054 wk−1 reported by Stanford
#       and Smith (1972) for several U.S. soils, 0.067 wk−1 for 42 soils from the
#       Saskatchewan province reported by Jalil et al. (1996) and 0.080 wk−1 reported by
#       Curtin and Wen (1999)." CONTRAST — the measured range ours falls outside.
#   [D] Ros, G.H., Temminghoff, E.J.M. & Hoffland, E. (2011), "Nitrogen mineralization: a
#       review and meta-analysis of the predictive value of soil tests", European Journal of
#       Soil Science 62:162–173. OPENED AND READ 2026-07-16 (round 2; an unlisted source,
#       not on the retrieval list — checked as a candidate substitute for [A]).
#       IT DOES NOT SUBSTITUTE, and that is the point of recording it. Its meta-analysis is
#       of how well chemical/biological SOIL TESTS predict mineralization (n = 2552 across
#       ~400 studies), NOT a compilation of first-order rate constants — so it yields no k
#       distribution to compare ours against. What it does confirm is provenance of the
#       FORM: p. 163, "Potential mineralizable N refers to the amount of N that mineralizes
#       under optimum and constant environmental conditions, and is usually derived by
#       fitting a first-order kinetic model to inorganic N concentrations over time
#       (Stanford & Smith, 1972)" — i.e. the first-order model this file uses is [A]'s, and
#       the field still treats [A] as its origin 39 years on. FORM corroboration only.
#
# PROVENANCE (post-roadmap bucket 3 scope C, 2026-07-16 — docs/plans/post-roadmap-citation.md).
#   NEITHER TODO(cite) discharged — both REMAIN OPEN, now carrying findings. [A] and [B]
#   are FORM citations; neither ever fixed a value, and neither could be opened.
#
#   FINDING (mineralization_rate) — ~3.9× the Stanford & Smith mean, and above the fastest
#   soil ever measured in a 43-soil set. Ours 0.03 /day = 0.21 /wk. [C]'s own 41-week
#   incubations across 43 soil × tillage × depth combinations span k = 0.018–0.174 /wk
#   (mean 0.070); Stanford & Smith's mean is 0.054 /wk = 0.0077 /day. So ours is ~3.9× the
#   S&S mean and ~1.2× above [C]'s single fastest soil — outside the whole observed range.
#   Four independent studies cluster at 0.054–0.080 /wk, so this is not one odd dataset.
#   Crucially these are ALREADY optimal-condition potential rates (35 °C, field capacity),
#   so the gap CANNOT be explained away by temperature/moisture modifiers. ROUND 3: that
#   clause is now first-hand — [E], written by [A]'s own second author, states the 35 °C /
#   approximate-field-capacity protocol directly. The PREMISE of the gap argument no longer
#   depends on a secondary.
#   Provenance caveat (NARROWED, not lifted, by round 3): the 0.054 /wk NUMBER is still [C]
#   QUOTING Stanford & Smith — [A] itself is paywalled (Wiley, HTTP 402) and was not opened,
#   and [E] gives no rate constant. So the chain survives for the VALUE and is broken for the
#   CONDITIONS. [C] is primary for its own 0.018–0.174 range, which independently places ours
#   outside.
#
#   FINDING (n_senescence_rate) — NO ACCESSIBLE PRIMARY SUPPORT AT ALL, and the highest
#   clean-room risk in the project. The accessible N-resorption literature is built around
#   resorption EFFICIENCY (a dimensionless %, ~50 % typical), not a relative rate (1/day) —
#   the wrong SHAPE to bind a first-order constant, so there is nothing to compare against.
#   ⚠ The relative-death-rate (rdr) tradition [B] seeded flows directly into WOFOST/PCSE, so
#   searches for numeric RDR / N-senescence values land almost exclusively on WOFOST-lineage
#   sources, which are LEGALLY OFF-LIMITS here. A future maintainer must not "just look it
#   up": retrieving the [B] monograph is the only clean path (see the plan doc's list).

name: chamber
process: mineralization

parameters:
  n_senescence_rate:
    value: 0.01
    unit: "1/day"
    source: "TODO(cite) — STILL OPEN, no primary support EXISTS in the shape this parameter needs — which round 2 established first-hand rather than by assumption (2026-07-16). [B] WAS RETRIEVED AND READ, and it does NOT settle this param: the plan doc predicted it was 'the only clean-room-safe route' to a number, but the book has no N-shedding rate at all — its senescence treatment is LEAF BIOMASS death (§3.2.6, p. 95), and it names N remobilization as a distinct process that is 'difficult to quantify'. That CORROBORATES the round-1 diagnosis from the horse's mouth: the N-resorption literature reports resorption EFFICIENCY (a %, ~50 % typical), not a 1/day rate, so no delta is computable and retrieval cannot fix it. NEW STRUCTURAL FINDING from opening [B]: its relative loss rate is a FUNCTION of development stage (0/day before anthesis, ramping to 0.15/day by DS 2.0), whereas ours is a bare CONSTANT — so ours is the degenerate case of the cited form, non-zero exactly where the source is zero. That is a FORM gap, not just a value gap, and it makes this param a scope-B structural candidate alongside the canopy and the decomposer rates rather than a mere citation debt. ⚠ CLEAN-ROOM HAZARD (unchanged): the rdr tradition flows into WOFOST/PCSE, so numeric RDR sources found by search are almost all WOFOST-lineage and legally unusable — do NOT backfill from them. [B]'s printed pages are literature and safe; PCSE's params are not. Changing the value/form is scope B. See docs/plans/post-roadmap-citation.md."
  mineralization_rate:
    value: 0.03
    unit: "1/day"
    source: "TODO(cite) — STILL OPEN, with a measured finding UNCHANGED by round 2 (2026-07-16): 0.03/day = 0.21/wk is ~3.9× the Stanford & Smith mean (0.054/wk = 0.0077/day) and ~1.2× ABOVE the fastest of 43 soils measured in [C] (range 0.018–0.174/wk, mean 0.070) — outside the whole observed range, with four independent studies clustering at 0.054–0.080/wk. These are already OPTIMAL-condition potential rates (35 °C, field capacity), so temperature/moisture modifiers cannot explain the gap. ROUND 2: unlike the other decomposer params, this one could NOT be upgraded — [A] was not among the sources supplied, and a search of a 29-source corpus (including [D], a dedicated N-mineralization review AND meta-analysis) found NO first-hand k anywhere to replace the [C]-quoting-[A] chain; the secondary literature propagates [A]'s form and quotes its mean without republishing its data. So this remains the weakest-provenance member of the decomposer finding: the 3.9× rests on [C] quoting [A], not on [A] read directly. The finding is corroborated independently by [C]'s OWN 43-soil measurements (ours is above their maximum), which do not depend on [A] at all. ROUND 3 (2026-07-20) — a PARTIAL upgrade, and only to the ARGUMENT, not the number: [A] is still paywalled, but [E] (a Current Contents 'Citation Classic' retrospective written by S.J. Smith, [A]'s own second author) was found and read. It gives NO k, so the 3.9× still rests on the [C]-quoting-[A] chain and this param is STILL the weakest-provenance member. What it does give first-hand is [A]'s protocol — 39 soils, 30-week incubation, and crucially the OPTIMUM 35 °C / approximate-field-capacity conditions. That is the premise that forbids explaining the gap away with temperature/moisture modifiers, and it is no longer secondary-mediated. Round 3 also CONFIRMED the retrieval ceiling rather than inheriting it: [A], Dunn 2011 and Divya 2009 were each re-attempted and were each still closed. ⚠ ROUND 4 (2026-07-20) FALSIFIED TWO-THIRDS OF THAT ONE DAY LATER: Dunn 2011 and Divya 2009 were supplied by the user and opened (and opening them exposed a confirmed FALSE attribution in power/self_discharge.yaml). Only [A] is still closed, and it is now the SOLE remaining item on the retrieval list (12 -> 3 -> 1). This param is UNAFFECTED — its 3.9x still rests on the [C]-quoting-[A] chain, unchanged — but the ceiling sentence is corrected because a stale negative result SUPPRESSES a future search. Changing the value is calibration = scope B. See docs/plans/post-roadmap-citation.md."
